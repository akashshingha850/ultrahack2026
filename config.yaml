# Coverage Path Planning Configuration

connection:
  # MAVLink connection string
  # Serial: /dev/ttyUSB0 (baud rate applies)
  # UDP:    udp:127.0.0.1:14550
  # TCP:    tcp:127.0.0.1:5760
  string: "udp:127.0.0.1:14500"
  baud: 57600
  source_system: 255
  timeout: 30               # seconds to wait for heartbeat

flight:
  altitude: 15.0            # metres AGL for survey passes
  speed: 5.0                # m/s groundspeed during coverage
  takeoff_altitude: 5.0    # metres AGL to climb before starting
  rtl_altitude: 5.0        # metres AGL for RTL

coverage:
  # Radius = FENCE_RADIUS − FENCE_MARGIN (both read from the vehicle).
  # Pass --radius <m> on the CLI for dry-run testing.

  pattern: "spiral"   # boustrophedon | spiral
  spacing: 10.0       # fallback spacing (m) – ignored when camera: block is set
  angle: 0.0          # degrees – rotation of the pattern (0 = north-aligned)
  entry: "nearest"    # boustrophedon only: nearest | first

# Camera: SIYI A8 Mini at 1× zoom.
# Ring spacing is auto-computed as  min(swath_w, swath_h) × (1 – overlap).
camera:
  hfov_deg: 82.6          # horizontal FOV at 1× zoom
  vfov_deg: 52.3          # vertical FOV (4K 16:9, derived from HFOV)
  overlap:   0.10         # 10 % side overlap – enough for surveillance
  gimbal_pitch_deg: -45.0 # 0 = look ahead, -90 = nadir; -45 optimal for window detection

waypoint:
  acceptance_radius: 2.0    # metres – considered "reached" (NED 2-D distance)
  loiter_time: 0            # seconds to loiter at each waypoint (0 = pass-through)
  timeout: 120              # seconds to wait for each waypoint before aborting

logging:
  level: "INFO"             # DEBUG | INFO | WARNING | ERROR
  file: "coverage_flight.log"
